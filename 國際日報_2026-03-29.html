<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>國際日報 2026-03-29</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'PingFang TC', 'Noto Sans TC', sans-serif;
      background: #0a0e1a;
      color: #c8d0e0;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #0d1526 0%, #121e3a 50%, #0a1020 100%);
      border-bottom: 1px solid #1e3058;
      padding: 28px 40px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .header-left { display: flex; align-items: center; gap: 18px; }
    .header-icon {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, #1a4fd6, #0e9af5);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      box-shadow: 0 4px 20px rgba(26,79,214,.45);
    }
    .header-title { font-size: 1.75rem; font-weight: 700; color: #e8f0ff; letter-spacing: .04em; }
    .header-subtitle { font-size: .85rem; color: #5a7aaa; margin-top: 3px; }
    .header-date {
      background: rgba(26,79,214,.18);
      border: 1px solid rgba(26,79,214,.35);
      border-radius: 10px;
      padding: 8px 18px;
      font-size: .9rem;
      color: #7baaf5;
      font-weight: 600;
      letter-spacing: .03em;
    }

    /* ── Summary bar ── */
    .summary-bar {
      background: #0c1220;
      border-bottom: 1px solid #162040;
      padding: 14px 40px;
      display: flex;
      gap: 28px;
      flex-wrap: wrap;
      align-items: center;
    }
    .summary-item {
      display: flex; align-items: center; gap: 8px;
      font-size: .82rem; color: #5a7aaa;
    }
    .summary-item span.val { color: #d0ddf8; font-weight: 600; }
    .pulse {
      width: 8px; height: 8px; border-radius: 50%;
      background: #2ecc71;
      box-shadow: 0 0 6px #2ecc71;
      animation: pulse 1.8s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.35;} }

    /* ── Main grid ── */
    .container { max-width: 1280px; margin: 0 auto; padding: 36px 28px 60px; }
    .section-title {
      font-size: 1rem; font-weight: 700; color: #4a7adc;
      text-transform: uppercase; letter-spacing: .12em;
      margin-bottom: 20px;
      display: flex; align-items: center; gap: 10px;
    }
    .section-title::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(to right, #1e3058, transparent);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    /* ── News card ── */
    .card {
      background: linear-gradient(160deg, #111826 0%, #0e1420 100%);
      border: 1px solid #1e2d4a;
      border-radius: 16px;
      padding: 22px 22px 18px;
      transition: transform .2s, box-shadow .2s, border-color .2s;
      cursor: default;
      position: relative;
      overflow: hidden;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0,0,0,.55);
      border-color: #2a4880;
    }
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 16px 16px 0 0;
    }
    .card.crisis::before  { background: linear-gradient(to right, #e74c3c, #c0392b); }
    .card.economy::before { background: linear-gradient(to right, #f39c12, #e67e22); }
    .card.diplo::before   { background: linear-gradient(to right, #3498db, #2980b9); }
    .card.military::before{ background: linear-gradient(to right, #8e44ad, #6c3483); }
    .card.politics::before{ background: linear-gradient(to right, #27ae60, #1e8449); }
    .card.energy::before  { background: linear-gradient(to right, #e67e22, #d35400); }
    .card.trade::before   { background: linear-gradient(to right, #16a085, #1abc9c); }

    .card-header {
      display: flex; align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }
    .card-tag {
      font-size: .7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .1em;
      padding: 3px 10px; border-radius: 20px;
      white-space: nowrap;
    }
    .tag-crisis  { background: rgba(231,76,60,.18);  color: #e74c3c; border: 1px solid rgba(231,76,60,.3); }
    .tag-economy { background: rgba(243,156,18,.18); color: #f39c12; border: 1px solid rgba(243,156,18,.3); }
    .tag-diplo   { background: rgba(52,152,219,.18); color: #3498db; border: 1px solid rgba(52,152,219,.3); }
    .tag-military{ background: rgba(142,68,173,.18); color: #9b59b6; border: 1px solid rgba(142,68,173,.3); }
    .tag-politics{ background: rgba(39,174,96,.18);  color: #27ae60; border: 1px solid rgba(39,174,96,.3); }
    .tag-energy  { background: rgba(230,126,34,.18); color: #e67e22; border: 1px solid rgba(230,126,34,.3); }
    .tag-trade   { background: rgba(22,160,133,.18); color: #1abc9c; border: 1px solid rgba(22,160,133,.3); }

    .card-time {
      font-size: .72rem; color: #3a5278;
      white-space: nowrap; margin-top: 2px;
    }
    .card-title {
      font-size: 1.05rem; font-weight: 700;
      color: #dde8ff; line-height: 1.4;
      margin-bottom: 10px;
    }
    .card-body-text {
      font-size: .875rem; color: #7090b8; line-height: 1.65;
    }
    .card-body-text strong { color: #a8c4e8; }

    .card-metrics {
      display: flex; gap: 12px; flex-wrap: wrap;
      margin-top: 14px; padding-top: 14px;
      border-top: 1px solid #1a2d4a;
    }
    .metric {
      display: flex; flex-direction: column; gap: 2px;
    }
    .metric-label { font-size: .68rem; color: #3a5278; text-transform: uppercase; letter-spacing: .08em; }
    .metric-value { font-size: .88rem; font-weight: 700; }
    .metric-value.up   { color: #e74c3c; }
    .metric-value.down { color: #2ecc71; }
    .metric-value.neu  { color: #f39c12; }
    .metric-value.blue { color: #3498db; }

    /* ── Breaking banner ── */
    .breaking-banner {
      background: linear-gradient(135deg, rgba(231,76,60,.15), rgba(192,57,43,.08));
      border: 1px solid rgba(231,76,60,.3);
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 28px;
      display: flex; align-items: center; gap: 14px;
    }
    .breaking-badge {
      background: #e74c3c; color: #fff;
      font-size: .7rem; font-weight: 800;
      padding: 3px 10px; border-radius: 6px;
      letter-spacing: .1em; white-space: nowrap;
    }
    .breaking-text { font-size: .88rem; color: #d0a0a0; }
    .breaking-text strong { color: #f5c6c6; }

    /* ── Footer ── */
    .footer {
      background: #080c18;
      border-top: 1px solid #141e30;
      padding: 22px 40px;
      text-align: center;
      font-size: .78rem;
      color: #2a3d5a;
    }
    .footer span { color: #3a5278; }
